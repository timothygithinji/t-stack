config:
  # CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID are passed via env var by `t-stack provision`.
  # The Cloudflare provider (v5+) reads them from the environment; no provider-level config here.
  {{projectName}}-cloudflare:accountId: {{org.cloudflareAccountId}}
  {{projectName}}-cloudflare:zoneId: {{cloudflareZoneId}}
  {{projectName}}-cloudflare:domain: {{domain}}

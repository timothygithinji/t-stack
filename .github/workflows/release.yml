name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump (leave blank to auto-detect from conventional commits)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - patch
          - minor
          - major
          - prerelease

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push tag + commit back to main
      id-token: write       # npm trusted publishing (OIDC) + provenance
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # release-it needs full history for conventional-changelog
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Set up Node (npm CLI exchanges OIDC for trusted-publishing token)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Lint, typecheck, test, build (gate)
        run: |
          bun run lint
          bun run typecheck
          bun run test
          bun run build

      - name: Release (release-it)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN. npm CLI uses the OIDC token from the runner to
          # authenticate via trusted publishing, configured at
          # https://www.npmjs.com/package/@timothygithinji/t-stack/access
          NPM_CONFIG_PROVENANCE: "true"
          INCREMENT: ${{ inputs.increment }}
        run: |
          if [ -n "$INCREMENT" ]; then
            bunx release-it "$INCREMENT" --ci
          else
            bunx release-it --ci
          fi

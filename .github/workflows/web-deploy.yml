name: Deploy web

# Web deploy chains off the Release workflow so the live site only
# updates when the CLI releases. workflow_run uses the default
# GITHUB_TOKEN and survives GitHub's no-recursive-trigger rule —
# unlike `on: release` which is blocked when the release is created
# by another Actions job.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        type: string

concurrency:
  group: web-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # workflow_run fires on completion regardless of conclusion — gate
    # on `success`. Manual dispatch always runs.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
    steps:
      - name: Log trigger
        env:
          EVENT: ${{ github.event_name }}
          REASON: ${{ github.event.inputs.reason }}
          ACTOR: ${{ github.actor }}
          UPSTREAM: ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "Trigger: $EVENT"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "Manual deploy triggered by $ACTOR"
            [ -n "$REASON" ] && echo "Reason: $REASON" || true
          else
            echo "Chained off Release workflow at commit $UPSTREAM"
          fi

      - uses: actions/checkout@v4
        # workflow_run events default to the workflow file's branch (main),
        # but we want the exact commit Release ran against to keep the
        # deployed bundle in lockstep with the published CLI.
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build apps/web
        run: bun --filter @t-stack/web build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/web
        run: bunx wrangler deploy

      - name: Summary
        if: success()
        env:
          UPSTREAM: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## Web deploy"
            echo ""
            echo "- Live at https://t-stack.timothygithinji.com"
            if [ -n "$UPSTREAM" ]; then
              echo "- Released commit \`${UPSTREAM::7}\`"
            else
              echo "- Manual deploy of \`${GITHUB_SHA::7}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

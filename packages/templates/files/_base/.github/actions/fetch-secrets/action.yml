name: Fetch Secrets
description: Fetch secrets from Doppler via a config-scoped service token

inputs:
  doppler-token:
    description: Doppler service token (read-only, config-scoped). Stored as a repo secret.
    required: true

runs:
  using: composite
  steps:
    - name: Install Doppler CLI
      uses: dopplerhq/cli-action@v3

    - name: Export secrets to GITHUB_ENV
      shell: bash
      env:
        DOPPLER_TOKEN: ${{ inputs.doppler-token }}
      run: |
        doppler secrets download \
          --no-file \
          --format=docker \
          >> "$GITHUB_ENV"
